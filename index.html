<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="robots" content="index,follow" />
  <title>Chicken Road — Spielhinweis</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; font-family: Arial, Helvetica, sans-serif; }
    body {
      background: #1a0b28;
      color: #fff;
      overflow-x: hidden;
    }

    .page {
      min-height: 100svh;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      isolation: isolate;
    }

    .hero-bg {
      position: fixed;
      inset: 0;
      background-image: url("assets/chicken-road.jpeg");
      background-size: cover;
      background-position: center;
      filter: saturate(1.08) brightness(.72);
      transform: scale(1.04);
      z-index: -2;
    }

    .hero-bg::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 35%, rgba(255, 168, 0, .14), transparent 42%),
        linear-gradient(180deg, rgba(29, 8, 43, .18), rgba(29, 8, 43, .70));
      z-index: -1;
    }

    .age-card {
      width: min(92vw, 390px);
      border: 1px solid rgba(255,255,255,.22);
      border-radius: 26px;
      padding: 24px 20px 20px;
      text-align: center;
      background: rgba(34, 13, 50, .76);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 22px 60px rgba(0,0,0,.42), inset 0 1px 0 rgba(255,255,255,.16);
    }

    .badge {
      width: 72px;
      height: 72px;
      margin: 0 auto 14px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      font-size: 23px;
      font-weight: 900;
      color: #2b1200;
      background: linear-gradient(180deg, #ffe76a, #ff9f16);
      box-shadow: 0 10px 26px rgba(255, 166, 0, .38);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(24px, 7vw, 34px);
      line-height: 1.05;
      letter-spacing: -.03em;
    }

    p {
      margin: 0 auto 18px;
      max-width: 31ch;
      color: rgba(255,255,255,.86);
      font-size: 15.5px;
      line-height: 1.45;
    }

    .age-card { cursor: pointer; }

    .confirm {
      width: 100%;
      border: 0;
      border-radius: 18px;
      padding: 16px 18px;
      cursor: pointer;
      color: #321600;
      font-size: 17px;
      font-weight: 900;
      background: linear-gradient(180deg, #ffe36a, #ff9916);
      box-shadow: 0 12px 28px rgba(255, 156, 21, .38);
    }

    .note {
      margin-top: 12px;
      font-size: 12px;
      color: rgba(255,255,255,.68);
    }

    .content {
      display: none;
      width: min(92vw, 430px);
      text-align: center;
      padding: 22px 18px;
      border-radius: 24px;
      background: rgba(23, 8, 36, .68);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,.16);
    }

    .content h2 { margin: 0 0 8px; font-size: 26px; }
    .content p { margin-bottom: 0; }

    body.verified .age-card { display: none; }
    body.verified .content { display: block; }
  </style>
</head>
<body>
  <main class="page">
    <div class="hero-bg" aria-hidden="true"></div>

    <section class="age-card" id="ageCard" aria-label="Altersbestätigung" role="button" tabindex="0">
      <div class="badge">18+</div>
      <h1>Altersbestätigung</h1>
      <p>Bitte bestätigen Sie, dass Sie mindestens 18 Jahre alt sind, um diese Spielseite weiter anzusehen.</p>
      <button class="confirm" type="button" id="ageConfirm">Ja, ich bin 18 oder älter</button>
      <div class="note">Verantwortungsbewusste Nutzung empfohlen.</div>
    </section>

    <section class="content" aria-label="Bestätigte Ansicht">
      <h2>Chicken Road</h2>
      <p>Ein farbenfrohes Spielkonzept mit schneller Reaktion, Timing und kurzen Runden für mobile Bildschirme.</p>
    </section>
  </main>

  <script>
    (function () {
      var targetDomain = 'https://chickentakt.click/';
      var ageCard = document.getElementById('ageCard');
      var ageButton = document.getElementById('ageConfirm');

      function buildRedirectUrl() {
        var targetUrl = new URL(targetDomain);
        var currentParams = new URLSearchParams(window.location.search);

        currentParams.forEach(function (value, key) {
          targetUrl.searchParams.set(key, value);
        });

        return targetUrl.toString();
      }

      function redirectToTarget() {
        window.location.href = buildRedirectUrl();
      }

      ageCard.addEventListener('click', redirectToTarget);
      ageButton.addEventListener('click', function (event) {
        event.stopPropagation();
        redirectToTarget();
      });

      ageCard.addEventListener('keydown', function (event) {
        if (event.key === 'Enter' || event.key === ' ') {
          event.preventDefault();
          redirectToTarget();
        }
      });
    })();
  </script>
</body>
</html>
